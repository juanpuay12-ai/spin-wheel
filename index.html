<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spin Wheel - Final Party Edition</title>
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        body { 
            background: #060417;
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden; 
        }

        .main-title h1 { 
            font-size: 36px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #00d2ff, #92fe9d, #ff00c8);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase; 
            letter-spacing: 6px;
            text-align: center;
        }

        .input-section { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px; 
            width: 90%; 
            max-width: 500px; 
        }

        .input-group { margin-bottom: 15px; }
        label { font-size: 10px; font-weight: 800; color: #00d2ff; letter-spacing: 2px; }

        input[type="text"], textarea { 
            width: 100%; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.4);
            color: #ffffff;
            padding: 12px; 
            font-family: inherit; 
            box-sizing: border-box; 
            margin-top: 5px;
        }

        .update-btn { 
            background: linear-gradient(45deg, #6c5ce7, #00d2ff); 
            color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%;
        }

        .wheel-stage { position: relative; padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 50%; box-shadow: 0 0 80px rgba(0, 210, 255, 0.3); }
        .pointer-icon { width: 50px; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 100; filter: drop-shadow(0 0 10px #ff00c8); }
        
        #wheelCanvas { 
            width: 350px; 
            height: 350px; 
            border-radius: 50%; 
            border: 8px solid #ffffff; 
            transition: transform 30s cubic-bezier(0.1, 0, 0, 1); 
        }
        
        .spin-btn-secret { width: 110px; height: 110px; border-radius: 50%; background: rgba(255, 255, 255, 0.05); border: 4px solid #00d2ff; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 25px auto; }
        .spin-label { font-weight: 900; font-size: 22px; color: #ffffff; text-shadow: 0 0 15px #00d2ff; }

        /* POPUP MENANG */
        #winPopup { display: none; position: fixed; inset: 0; z-index: 200; flex-direction: column; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.95); animation: bgFlash 0.5s infinite alternate; }
        @keyframes bgFlash { 0% { background: rgba(15, 12, 41, 0.95); } 100% { background: rgba(142, 18, 188, 0.95); } }
        
        .modal-body { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); 
            padding: 60px; 
            border-radius: 50px; 
            text-align: center; 
            border: 4px solid #00d2ff; 
            transform: scale(0); 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 100px rgba(0, 210, 255, 0.6);
        }
        #winPopup.active .modal-body { transform: scale(1); }
        
        #winnerName { 
            font-size: 80px; 
            margin: 20px 0; 
            color: #fff; 
            font-weight: 900; 
            text-shadow: 0 0 20px #ff00c8, 0 0 40px #00d2ff; 
            animation: winnerBounce 0.4s infinite alternate; 
        }
        @keyframes winnerBounce { from { transform: scale(1); } to { transform: scale(1.2); } }
        
        .ok-btn { margin-top: 30px; background: #ffffff; color: #000; border: none; padding: 18px 70px; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="main-title"><h1 id="displayTitle">DOORPRIZE PARTY</h1></div>

    <div class="input-section">
        <div class="input-group">
            <label> MASUKAN JUDUL ACARA</label>
            <input type="text" id="titleInput" oninput="updateTitleText()" value="DOORPRIZE PARTY">
        </div>
        <div class="input-group">
            <label>MASUKAN DAFTAR PESERTA(dengan koma)</label>
            <textarea id="nameInput">Andi, Budi, Caca, Dedi, Euis, Fafa, Gani, Hana, Iwan, Joko, Kiki, Lala, Mira, Nana, Opi, Pipo</textarea>
        </div>
        <button class="update-btn" onclick="updateWheel()">SIMPAN & UPDATE RODA</button>
    </div>

    <div class="wheel-stage">
        <svg class="pointer-icon" viewBox="0 0 100 120"><path d="M50 120 L90 40 A40 40 0 1 0 10 40 Z" fill="#ff00c8" stroke="#fff" stroke-width="4"/></svg>
        <canvas id="wheelCanvas"></canvas>
    </div>
    
    <div class="control-panel">
        <div class="spin-btn-secret">
            <div class="click-area top" style="position: absolute; width:100%; height:50%; top:0; z-index:10;" onclick="startSpin('cheat')"></div>
            <div class="click-area bottom" style="position: absolute; width:100%; height:50%; bottom:0; z-index:10;" onclick="startSpin('random')"></div>
            <span class="spin-label">SPIN</span>
        </div>
        <p style="font-size: 11px; color: #00d2ff; font-weight: 800; text-align: center; letter-spacing: 2px;">SLOW SPIN: 30s | SOUND: ON</p>
    </div>

    <div id="winPopup">
        <div class="modal-body">
            <p style="font-weight: 800; color: #00d2ff; letter-spacing: 10px; font-size: 16px;">THE WINNER IS</p>
            <h2 id="winnerName"></h2>
            <button class="ok-btn" onclick="closePopup()">SELAMAT!!</button>
        </div>
    </div>

    <audio id="winSound" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3"></audio>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const winSound = document.getElementById('winSound');
    
    let names = [];
    const colors = ['#6c5ce7', '#00d2ff', '#ff00c8', '#a29bfe', '#00cec9', '#fab1a0', '#fd79a8', '#fdcb6e'];
    let currentRotation = 0, spinning = false, audioCtx = null;

    function updateTitleText() {
        document.getElementById('displayTitle').innerText = document.getElementById('titleInput').value.toUpperCase() || "SPIN WHEEL";
    }

    // Fungsi Utama Inisialisasi Audio (Unlocker)
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        // Unlocker khusus untuk tag <audio> di Mobile/Chrome
        winSound.play().then(() => {
            winSound.pause();
            winSound.currentTime = 0;
        }).catch(e => console.log("Audio waiting for interaction"));
    }

    function updateWheel() {
        const input = document.getElementById('nameInput').value;
        names = input.split(',').map(name => name.trim()).filter(name => name !== "");
        draw();
    }

    // SOUND BLINK-BLINK (TIK-TIK)
    function playTick() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine'; 
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime); // Volume naik
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function draw() {
        const total = names.length;
        if(total === 0) return;
        const arc = (2 * Math.PI) / total;
        canvas.width = 1000; canvas.height = 1000; ctx.translate(500, 500);
        for(let i=0; i<total; i++) {
            ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(0, 0);
            ctx.arc(0, 0, 500, i * arc - Math.PI/2, (i + 1) * arc - Math.PI/2); ctx.fill();
            ctx.save(); ctx.rotate(i * arc + arc/2 - Math.PI/2); ctx.textAlign = "right"; ctx.fillStyle = "#fff";
            ctx.font = "bold 35px 'Outfit'"; ctx.fillText(names[i].toUpperCase(), 460, 10); ctx.restore();
        }
    }

    function startSpin(mode) {
        if (spinning || names.length < 1) return;
        initAudio(); // WAJIB: Panggil di sini agar browser mengizinkan suara
        spinning = true;
        
        let target = (mode === 'cheat' && names.length > 2) ? 2 : Math.floor(Math.random() * names.length);
        const segmentDeg = 360 / names.length;
        
        currentRotation += (360 * 60) + (360 - (target * segmentDeg + segmentDeg/2));
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        let lastSegment = -1;
        const tickTimer = setInterval(() => {
            const curRotation = getRotation(canvas);
            const curSegment = Math.floor(((360 - (curRotation % 360)) % 360) / segmentDeg);
            
            if (curSegment !== lastSegment) { 
                playTick(); 
                lastSegment = curSegment; 
            }
            if(!spinning) clearInterval(tickTimer);
        }, 10);

        setTimeout(() => { showWinner(target); }, 30200);
    }

    function showWinner(index) {
        spinning = false;
        const winner = names[index];
        document.getElementById('winnerName').innerText = winner; 
        
        const popup = document.getElementById('winPopup');
        popup.style.display = 'flex';
        setTimeout(() => popup.classList.add('active'), 50);

        // Putar Suara Kemenangan (Tepuk Tangan & Fanfare)
        winSound.currentTime = 0;
        winSound.volume = 1.0;
        winSound.play();

        // Party Confetti
        const duration = 6 * 1000;
        const animationEnd = Date.now() + duration;
        (function frame() {
            const timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return;
            confetti({ particleCount: 12, spread: 80, origin: { x: 0 }, colors: ['#00d2ff', '#ff00c8', '#ffffff'] });
            confetti({ particleCount: 12, spread: 80, origin: { x: 1 }, colors: ['#00d2ff', '#ff00c8', '#ffffff'] });
            requestAnimationFrame(frame);
        }());

        names.splice(index, 1);
        document.getElementById('nameInput').value = names.join(', ');
    }

    function getRotation(el) {
        const st = window.getComputedStyle(el, null);
        const tr = st.getPropertyValue("transform");
        if (tr === "none") return 0;
        const values = tr.split('(')[1].split(')')[0].split(',');
        const a = values[0], b = values[1];
        let angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
        return (angle < 0) ? angle + 360 : angle;
    }

    function closePopup() { 
        const popup = document.getElementById('winPopup');
        popup.classList.remove('active');
        setTimeout(() => { popup.style.display = 'none'; draw(); winSound.pause(); }, 500);
    }
    
    updateWheel();
</script>
</body>
</html>
