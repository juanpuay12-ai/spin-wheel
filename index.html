<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spin Wheel - JP Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        body { background: #f4f7f6; color: #2d3436; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; overflow-x: hidden; }
        
        .main-title { text-align: center; margin-bottom: 20px; }
        .main-title h1 { font-size: 36px; font-weight: 900; margin: 0; background: linear-gradient(45deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 4px; }

        /* Panel Input Nama */
        .input-section { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; width: 90%; max-width: 500px; text-align: center; }
        textarea { width: 100%; height: 60px; border-radius: 12px; border: 2px solid #eee; padding: 10px; font-family: inherit; resize: none; margin-bottom: 10px; box-sizing: border-box; }
        textarea:focus { border-color: #6c5ce7; outline: none; }
        .update-btn { background: #6c5ce7; color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .update-btn:hover { background: #a29bfe; }

        /* Container Roda */
        .wheel-stage { position: relative; padding: 15px; background: #ffffff; border-radius: 50%; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: 10px; }
        .pointer-icon { width: 45px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 100; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        #wheelCanvas { width: 350px; height: 350px; border-radius: 50%; border: 8px solid #6c5ce7; transition: transform 20s cubic-bezier(0.15, 0, 0, 1); }
        
        .control-panel { margin-top: 25px; text-align: center; }
        .spin-btn-secret { width: 100px; height: 100px; border-radius: 50%; background: #ffffff; border: 6px solid #6c5ce7; position: relative; cursor: pointer; box-shadow: 0 10px 25px rgba(108, 92, 231, 0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto; user-select: none; }
        .spin-btn-secret:active { transform: scale(0.92); }
        .spin-label { font-weight: 900; font-size: 20px; color: #6c5ce7; pointer-events: none; }
        
        .click-area { position: absolute; width: 100%; height: 50%; left: 0; z-index: 5; }
        .click-area.top { top: 0; border-radius: 50px 50px 0 0; }
        .click-area.bottom { bottom: 0; border-radius: 0 0 50px 50px; }

        /* Modal Popup */
        #winPopup { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        .modal-body { background: white; padding: 50px; border-radius: 40px; text-align: center; box-shadow: 0 30px 80px rgba(108,92,231,0.4); border: 4px solid #6c5ce7; animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        #winnerName { font-size: 50px; margin: 15px 0; color: #2d3436; font-weight: 900; animation: pulseWinner 1s infinite alternate; }
        @keyframes popUp { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulseWinner { from { transform: scale(1); } to { transform: scale(1.1); } }
        .ok-btn { margin-top: 20px; background: #6c5ce7; color: white; border: none; padding: 12px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-title">
        <h1>Grand Draw</h1>
    </div>

    <div class="input-section">
        <p style="font-size: 12px; font-weight: 800; margin-bottom: 10px; color: #6c5ce7;">DAFTAR NAMA </p>
        <textarea id="nameInput">Andi, Budi, Caca, Dedi, Euis, Fafa, Gani, Hana, Iwan, Joko, Kiki, Lala, Mira, Nana, Opi, Pipo</textarea>
        <button class="update-btn" onclick="updateWheel()">UPDATE RODA</button>
    </div>

    <div class="wheel-stage">
        <svg class="pointer-icon" viewBox="0 0 100 120"><path d="M50 120 L90 40 A40 40 0 1 0 10 40 Z" fill="#6c5ce7" stroke="#fff" stroke-width="4"/><circle cx="50" cy="45" r="12" fill="#fff" /></svg>
        <canvas id="wheelCanvas"></canvas>
    </div>
    
    <div class="control-panel">
        <div class="spin-btn-secret">
            <div class="click-area top" onclick="startExtremeSpin('cheat')"></div>
            <div class="click-area bottom" onclick="startExtremeSpin('random')"></div>
            <span class="spin-label">SPIN</span>
        </div>
        <p id="status" style="font-size: 11px; color: #b2bec3; margin-top: 15px; font-weight: 800;">READY TO SPIN</p>
    </div>

    <div id="winPopup">
        <div class="modal-body">
            <p style="font-weight: 800; color: #6c5ce7; letter-spacing: 5px; font-size: 12px;">CONGRATULATIONS</p>
            <h2 id="winnerName"></h2>
            <button class="ok-btn" onclick="closePopup()">AMAZING!</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let names = [];
    const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fab1a0', '#81ecec', '#d63031', '#0984e3', '#00b894', '#fdcb6e', '#6c5ce7', '#e17055', '#00cec9', '#fd79a8', '#636e72'];
    let currentRotation = 0, spinning = false, audioCtx = null;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function updateWheel() {
        const input = document.getElementById('nameInput').value;
        names = input.split(',').map(name => name.trim()).filter(name => name !== "");
        draw();
    }

    function playTick() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playApplause() {
        if(!audioCtx) return;
        const bufferSize = audioCtx.sampleRate * 3;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1) * (Math.random() > 0.98 ? 1.2 : 0.3); }
        const source = audioCtx.createBufferSource(); source.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1500;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3);
        source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); source.start();
    }

    function draw() {
        const total = names.length;
        if(total === 0) {
            ctx.clearRect(-500, -500, 1000, 1000);
            return;
        }
        const arc = (2 * Math.PI) / total;
        canvas.width = 1000; canvas.height = 1000; ctx.translate(500, 500);
        ctx.clearRect(-500, -500, 1000, 1000);
        for(let i=0; i<total; i++) {
            ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(0, 0);
            ctx.arc(0, 0, 500, i * arc - Math.PI/2, (i + 1) * arc - Math.PI/2); ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 4; ctx.stroke();
            ctx.save(); ctx.rotate(i * arc + arc/2 - Math.PI/2); ctx.textAlign = "right"; ctx.fillStyle = "#fff";
            ctx.font = total > 20 ? "bold 20px 'Outfit'" : "bold 32px 'Outfit'";
            ctx.fillText(names[i].toUpperCase(), 460, 10); ctx.restore();
        }
    }

    function startExtremeSpin(mode) {
        if (spinning || names.length < 1) return;
        if (names.length === 1) {
            showWinner(0);
            return;
        }
        
        initAudio(); spinning = true;
        document.getElementById('status').innerText = "MENENTUKAN NASIB...";
        
        let target = (mode === 'cheat' && names.length > 2) ? 2 : Math.floor(Math.random() * names.length);
        
        const segmentDeg = 360 / names.length;
        const extraRot = 360 * 35;
        const stopPoint = extraRot + (360 - (target * segmentDeg + segmentDeg/2));
        currentRotation += stopPoint + (360 - (currentRotation % 360));
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        let lastSegment = -1;
        const startTime = Date.now();
        const tickTimer = setInterval(() => {
            if (Date.now() - startTime >= 20000) { clearInterval(tickTimer); return; }
            const curRotation = getRotation(canvas);
            const curSegment = Math.floor(((360 - (curRotation % 360)) % 360) / segmentDeg);
            if (curSegment !== lastSegment) { playTick(); lastSegment = curSegment; }
        }, 10);

        setTimeout(() => { 
            showWinner(target);
        }, 20500);
    }

    function showWinner(index) {
        playApplause();
        const winner = names[index];
        document.getElementById('winnerName').innerText = winner; 
        document.getElementById('winPopup').style.display = 'flex';
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        // --- LOGIKA HAPUS OTOMATIS ---
        names.splice(index, 1); // Hapus dari array
        document.getElementById('nameInput').value = names.join(', '); // Update textarea
        
        spinning = false; 
        document.getElementById('status').innerText = "READY TO SPIN AGAIN";
    }

    function getRotation(el) {
        const st = window.getComputedStyle(el, null);
        const tr = st.getPropertyValue("transform");
        if (tr === "none") return 0;
        const values = tr.split('(')[1].split(')')[0].split(',');
        const a = values[0], b = values[1];
        let angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
        return (angle < 0) ? angle + 360 : angle;
    }

    function closePopup() { 
        document.getElementById('winPopup').style.display = 'none'; 
        draw(); // Gambar ulang roda setelah popup ditutup agar terlihat perubahannya
    }
    
    updateWheel();
</script>
</body>
</html>
