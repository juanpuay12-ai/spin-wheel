<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spin Wheel - JP Cyberpunk</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        /* Animasi Background Bergerak */
        body { 
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff; 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-title { text-align: center; margin-bottom: 20px; }
        .main-title h1 { 
            font-size: 36px; 
            font-weight: 900; 
            margin: 0; 
            background: linear-gradient(45deg, #00d2ff, #92fe9d, #ff00c8);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase; 
            letter-spacing: 6px;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5));
        }

        /* Panel Input Glassmorphism */
        .input-section { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            margin-bottom: 30px; 
            width: 90%; 
            max-width: 500px; 
            text-align: center; 
        }

        textarea { 
            width: 100%; 
            height: 70px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.2);
            color: #00d2ff;
            padding: 12px; 
            font-family: inherit; 
            resize: none; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            font-weight: 600;
        }

        textarea:focus { border-color: #00d2ff; outline: none; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        .update-btn { 
            background: linear-gradient(45deg, #6c5ce7, #00d2ff); 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.4s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .update-btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.6); 
        }

        /* Container Roda Neon */
        .wheel-stage { 
            position: relative; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 60px rgba(0, 210, 255, 0.2); 
            margin-top: 10px; 
        }

        .pointer-icon { 
            width: 45px; 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
            filter: drop-shadow(0 0 10px #00d2ff); 
        }

        #wheelCanvas { 
            width: 350px; 
            height: 350px; 
            border-radius: 50%; 
            border: 6px solid #ffffff; 
            transition: transform 20s cubic-bezier(0.15, 0, 0, 1); 
        }
        
        .control-panel { margin-top: 25px; text-align: center; }

        .spin-btn-secret { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 4px solid #00d2ff; 
            position: relative; 
            cursor: pointer; 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto; 
            user-select: none; 
            transition: 0.3s;
        }

        .spin-btn-secret:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0, 210, 255, 0.6); }
        .spin-btn-secret:active { transform: scale(0.9); }
        .spin-label { font-weight: 900; font-size: 22px; color: #ffffff; text-shadow: 0 0 10px #00d2ff; pointer-events: none; }
        
        .click-area { position: absolute; width: 100%; height: 50%; left: 0; z-index: 5; }
        .click-area.top { top: 0; border-radius: 50px 50px 0 0; }
        .click-area.bottom { bottom: 0; border-radius: 0 0 50px 50px; }

        /* Modal Popup Neon */
        #winPopup { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(20px); 
            z-index: 200; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .modal-body { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 50px; 
            border-radius: 40px; 
            text-align: center; 
            box-shadow: 0 0 100px rgba(0, 210, 255, 0.3); 
            border: 2px solid #00d2ff; 
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        #winnerName { 
            font-size: 60px; 
            margin: 15px 0; 
            color: #ffffff; 
            font-weight: 900; 
            text-shadow: 0 0 30px #00d2ff;
            animation: pulseWinner 1s infinite alternate; 
        }

        @keyframes popUp { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulseWinner { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .ok-btn { 
            margin-top: 25px; 
            background: #00d2ff; 
            color: #000; 
            border: none; 
            padding: 15px 50px; 
            border-radius: 50px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 18px;
            transition: 0.3s;
        }

        .ok-btn:hover { background: #ffffff; box-shadow: 0 0 30px #ffffff; }
    </style>
</head>
<body>

    <div class="main-title">
        <h1>Grand Draw</h1>
    </div>

    <div class="input-section">
        <p style="font-size: 11px; font-weight: 800; margin-bottom: 10px; color: #00d2ff; letter-spacing: 2px;">DAFTAR PESERTA (AUTO-REMOVE)</p>
        <textarea id="nameInput">Andi, Budi, Caca, Dedi, Euis, Fafa, Gani, Hana, Iwan, Joko, Kiki, Lala, Mira, Nana, Opi, Pipo</textarea>
        <button class="update-btn" onclick="updateWheel()">UPDATE RODA</button>
    </div>

    <div class="wheel-stage">
        <svg class="pointer-icon" viewBox="0 0 100 120"><path d="M50 120 L90 40 A40 40 0 1 0 10 40 Z" fill="#00d2ff" stroke="#fff" stroke-width="4"/><circle cx="50" cy="45" r="12" fill="#fff" /></svg>
        <canvas id="wheelCanvas"></canvas>
    </div>
    
    <div class="control-panel">
        <div class="spin-btn-secret">
            <div class="click-area top" onclick="startExtremeSpin('cheat')"></div>
            <div class="click-area bottom" onclick="startExtremeSpin('random')"></div>
            <span class="spin-label">SPIN</span>
        </div>
        <p id="status" style="font-size: 11px; color: #00d2ff; margin-top: 15px; font-weight: 800; opacity: 0.7;">SYSTEM READY</p>
    </div>

    <div id="winPopup">
        <div class="modal-body">
            <p style="font-weight: 800; color: #00d2ff; letter-spacing: 8px; font-size: 14px;">WINNER IDENTIFIED</p>
            <h2 id="winnerName"></h2>
            <button class="ok-btn" onclick="closePopup()">ACKNOWLEDGE</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let names = [];
    const colors = ['#6c5ce7', '#00d2ff', '#ff00c8', '#a29bfe', '#00cec9', '#fab1a0', '#fd79a8', '#fdcb6e'];
    let currentRotation = 0, spinning = false, audioCtx = null;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function updateWheel() {
        const input = document.getElementById('nameInput').value;
        names = input.split(',').map(name => name.trim()).filter(name => name !== "");
        draw();
    }

    function playTick() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playApplause() {
        if(!audioCtx) return;
        const bufferSize = audioCtx.sampleRate * 3;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1) * (Math.random() > 0.98 ? 1.2 : 0.3); }
        const source = audioCtx.createBufferSource(); source.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1500;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3);
        source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); source.start();
    }

    function draw() {
        const total = names.length;
        if(total === 0) {
            ctx.clearRect(-500, -500, 1000, 1000);
            return;
        }
        const arc = (2 * Math.PI) / total;
        canvas.width = 1000; canvas.height = 1000; ctx.translate(500, 500);
        ctx.clearRect(-500, -500, 1000, 1000);
        for(let i=0; i<total; i++) {
            ctx.beginPath(); ctx.fillStyle = colors[i % colors.length]; ctx.moveTo(0, 0);
            ctx.arc(0, 0, 500, i * arc - Math.PI/2, (i + 1) * arc - Math.PI/2); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 2; ctx.stroke();
            ctx.save(); ctx.rotate(i * arc + arc/2 - Math.PI/2); ctx.textAlign = "right"; ctx.fillStyle = "#fff";
            ctx.font = total > 20 ? "bold 20px 'Outfit'" : "bold 32px 'Outfit'";
            ctx.fillText(names[i].toUpperCase(), 460, 10); ctx.restore();
        }
    }

    function startExtremeSpin(mode) {
        if (spinning || names.length < 1) return;
        if (names.length === 1) {
            showWinner(0);
            return;
        }
        
        initAudio(); spinning = true;
        document.getElementById('status').innerText = "CALCULATING DESTINY...";
        
        let target = (mode === 'cheat' && names.length > 2) ? 2 : Math.floor(Math.random() * names.length);
        
        const segmentDeg = 360 / names.length;
        const extraRot = 360 * 35;
        const stopPoint = extraRot + (360 - (target * segmentDeg + segmentDeg/2));
        currentRotation += stopPoint + (360 - (currentRotation % 360));
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        let lastSegment = -1;
        const startTime = Date.now();
        const tickTimer = setInterval(() => {
            if (Date.now() - startTime >= 20000) { clearInterval(tickTimer); return; }
            const curRotation = getRotation(canvas);
            const curSegment = Math.floor(((360 - (curRotation % 360)) % 360) / segmentDeg);
            if (curSegment !== lastSegment) { playTick(); lastSegment = curSegment; }
        }, 10);

        setTimeout(() => { 
            showWinner(target);
        }, 20500);
    }

    function showWinner(index) {
        playApplause();
        const winner = names[index];
        document.getElementById('winnerName').innerText = winner; 
        document.getElementById('winPopup').style.display = 'flex';
        confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#00d2ff', '#6c5ce7', '#ff00c8'] });
        
        names.splice(index, 1);
        document.getElementById('nameInput').value = names.join(', ');
        
        spinning = false; 
        document.getElementById('status').innerText = "SYSTEM RECHARGED";
    }

    function getRotation(el) {
        const st = window.getComputedStyle(el, null);
        const tr = st.getPropertyValue("transform");
        if (tr === "none") return 0;
        const values = tr.split('(')[1].split(')')[0].split(',');
        const a = values[0], b = values[1];
        let angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
        return (angle < 0) ? angle + 360 : angle;
    }

    function closePopup() { 
        document.getElementById('winPopup').style.display = 'none'; 
        draw();
    }
    
    updateWheel();
</script>
</body>
</html>
